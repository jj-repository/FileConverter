name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0
  workflow_dispatch:  # Allows manual trigger

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false  # Continue other builds even if one fails
      matrix:
        os: [ubuntu-latest, windows-2022]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python virtual environment (Linux)
        if: runner.os == 'Linux'
        working-directory: backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.14.2

      - name: Setup Python virtual environment (Windows)
        if: runner.os == 'Windows'
        working-directory: backend
        run: |
          python -m venv venv
          .\venv\Scripts\Activate.ps1
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.14.2

      - name: Build backend with PyInstaller (Linux)
        if: runner.os == 'Linux'
        working-directory: backend
        run: |
          source venv/bin/activate
          pyinstaller backend-server.spec --clean

      - name: Disable Windows Defender real-time monitoring (speeds up PyInstaller)
        if: runner.os == 'Windows'
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Build backend with PyInstaller (Windows)
        if: runner.os == 'Windows'
        working-directory: backend
        timeout-minutes: 30
        run: |
          .\venv\Scripts\Activate.ps1
          pyinstaller backend-server.spec --log-level INFO

      - name: Download FFmpeg and Pandoc (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p resources/bin/linux

          # Download FFmpeg static build (pinned to 7.1) + verify md5
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-7.1-amd64-static.tar.xz
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-7.1-amd64-static.tar.xz.md5
          md5sum -c ffmpeg-7.1-amd64-static.tar.xz.md5
          tar -xf ffmpeg-7.1-amd64-static.tar.xz
          mv ffmpeg-7.1-amd64-static/ffmpeg resources/bin/linux/
          mv ffmpeg-7.1-amd64-static/ffprobe resources/bin/linux/
          chmod +x resources/bin/linux/ffmpeg resources/bin/linux/ffprobe
          rm -rf ffmpeg-7.1-amd64-static*

          # Download Pandoc + verify SHA256
          wget -q https://github.com/jgm/pandoc/releases/download/3.6.1/pandoc-3.6.1-linux-amd64.tar.gz
          wget -q https://github.com/jgm/pandoc/releases/download/3.6.1/pandoc-3.6.1-linux-amd64.tar.gz.sha256
          sha256sum -c pandoc-3.6.1-linux-amd64.tar.gz.sha256
          tar -xzf pandoc-3.6.1-linux-amd64.tar.gz
          mv pandoc-3.6.1/bin/pandoc resources/bin/linux/
          chmod +x resources/bin/linux/pandoc
          rm -rf pandoc-3.6.1*

      - name: Download FFmpeg and Pandoc (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path resources\bin\windows

          # Download FFmpeg (pinned to 7.1) + verify SHA256
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2025-03-31-14-18/ffmpeg-n7.1-31-g0acb1cd0dc-win64-gpl-7.1.zip" -OutFile ffmpeg.zip
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2025-03-31-14-18/ffmpeg-n7.1-31-g0acb1cd0dc-win64-gpl-7.1.zip.sha256" -OutFile ffmpeg.zip.sha256
          $expectedFFmpegHash = (Get-Content ffmpeg.zip.sha256 -Raw).Trim().Split()[0].ToUpper()
          $actualFFmpegHash = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash
          if ($actualFFmpegHash -ne $expectedFFmpegHash) { throw "FFmpeg SHA256 mismatch: expected $expectedFFmpegHash got $actualFFmpegHash" }
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          Copy-Item "ffmpeg-n7.1-31-g0acb1cd0dc-win64-gpl-7.1\bin\ffmpeg.exe" resources\bin\windows\
          Copy-Item "ffmpeg-n7.1-31-g0acb1cd0dc-win64-gpl-7.1\bin\ffprobe.exe" resources\bin\windows\
          Remove-Item -Recurse -Force ffmpeg-n7.1-31-g0acb1cd0dc-win64-gpl-7.1, ffmpeg.zip, ffmpeg.zip.sha256

          # Download Pandoc + verify SHA256
          Invoke-WebRequest -Uri "https://github.com/jgm/pandoc/releases/download/3.6.1/pandoc-3.6.1-windows-x86_64.zip" -OutFile pandoc.zip
          Invoke-WebRequest -Uri "https://github.com/jgm/pandoc/releases/download/3.6.1/pandoc-3.6.1-windows-x86_64.zip.sha256" -OutFile pandoc.zip.sha256
          $expectedPandocHash = (Get-Content pandoc.zip.sha256 -Raw).Trim().Split()[0].ToUpper()
          $actualPandocHash = (Get-FileHash pandoc.zip -Algorithm SHA256).Hash
          if ($actualPandocHash -ne $expectedPandocHash) { throw "Pandoc SHA256 mismatch: expected $expectedPandocHash got $actualPandocHash" }
          Expand-Archive -Path pandoc.zip -DestinationPath .
          Copy-Item "pandoc-3.6.1\pandoc.exe" resources\bin\windows\
          Remove-Item -Recurse -Force pandoc-3.6.1, pandoc.zip, pandoc.zip.sha256

      - name: Build Electron app (Linux)
        if: runner.os == 'Linux'
        working-directory: frontend
        run: npx electron-builder --linux --publish never

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        working-directory: frontend
        run: npx electron-builder --win --publish never

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: linux-release
          path: |
            frontend/dist-electron/*.AppImage
            frontend/dist-electron/*.deb
          retention-days: 1

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: windows-release
          path: |
            frontend/dist-electron/*.exe
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8

      - name: Generate SHA256SUMS
        run: |
          sha256sum linux-release/* windows-release/* > SHA256SUMS

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            linux-release/* \
            windows-release/* \
            SHA256SUMS \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
