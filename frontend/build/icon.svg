<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="docA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="docB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- rounded square background -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>

  <!-- back document (gold) -->
  <g filter="url(#shadow)">
    <path d="M 150 52 L 204 52 L 232 80 L 232 184 C 232 192 226 198 218 198 L 150 198 C 142 198 136 192 136 184 L 136 66 C 136 58 142 52 150 52 Z"
          fill="url(#docB)" stroke="#92400e" stroke-width="2"/>
    <path d="M 204 52 L 204 80 L 232 80 Z" fill="#f59e0b" stroke="#92400e" stroke-width="2"/>
    <line x1="154" y1="112" x2="214" y2="112" stroke="#92400e" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="154" y1="130" x2="214" y2="130" stroke="#92400e" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="154" y1="148" x2="198" y2="148" stroke="#92400e" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- front document (white) -->
  <g filter="url(#shadow)">
    <path d="M 38 68 L 92 68 L 120 96 L 120 200 C 120 208 114 214 106 214 L 38 214 C 30 214 24 208 24 200 L 24 82 C 24 74 30 68 38 68 Z"
          fill="url(#docA)" stroke="#1e40af" stroke-width="2"/>
    <path d="M 92 68 L 92 96 L 120 96 Z" fill="#bfdbfe" stroke="#1e40af" stroke-width="2"/>
    <line x1="42" y1="128" x2="102" y2="128" stroke="#1e40af" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="42" y1="146" x2="102" y2="146" stroke="#1e40af" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="42" y1="164" x2="86" y2="164" stroke="#1e40af" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- conversion arrow: two-way -->
  <g>
    <path d="M 120 130 L 136 130 M 130 122 L 140 130 L 130 138"
          fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 136 150 L 120 150 M 126 142 L 116 150 L 126 158"
          fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
