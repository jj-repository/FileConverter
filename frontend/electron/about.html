<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:">
  <title>About FileConverter</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #ffffff;
      color: #1f2937;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      gap: 10px;
    }
    .mascot {
      width: 120px;
      height: 120px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12));
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      margin-top: 6px;
    }
    .version {
      font-size: 13px;
      color: #6b7280;
    }
    .desc {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      max-width: 280px;
      line-height: 1.4;
    }
    .by {
      font-size: 11px;
      color: #9ca3af;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #1f2937; color: #f3f4f6; }
      .version, .desc { color: #9ca3af; }
      .by { color: #6b7280; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img id="mascot" class="mascot" alt="FileConverter mascot" />
    <div class="title">FileConverter</div>
    <div class="version" id="version">v—</div>
    <div class="desc">A desktop file conversion application.<br>Built with Electron and Python.</div>
    <div class="by">by JJ</div>
  </div>
  <script>
    // Version + mascot path injected via query string
    const params = new URLSearchParams(location.search);
    document.getElementById('version').textContent = 'v' + (params.get('v') || '');
    const mascotPath = params.get('mascot');
    if (mascotPath) document.getElementById('mascot').src = mascotPath;
  </script>
</body>
</html>
