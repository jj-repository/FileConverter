target-version = "py311"
line-length = 100

[lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E402",   # module-level imports after conditional setup — intentional
    "E501",   # line too long — handled by formatter
]

[lint.per-file-ignores]
"backend/tests/**" = ["F401", "F811", "E722"]  # test imports for availability, redefined fixtures, bare except
